{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Drivers Den</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="site-shell signup-shell">
    <nav class="navbar">
      <a class="navbar-logo" href="{% url 'drivers:home' %}" aria-label="Go to home page">
        <span class="navbar-title">DRIVERS <span class="den">DEN</span></span>
      </a>
      <div class="navbar-auth">
        <a href="{% url 'drivers:signup' %}" class="auth-link">Signup</a>
      </div>
    </nav>

    <main class="signup-main">
      <section class="signup-section">
        <h2>Login to your account</h2>
        {% if form.errors %}
          <div class="form-errors">
            <p>Invalid credentials. Please try again.</p>
          </div>
        {% endif %}
        <form method="post" action="{% url 'login' %}" class="signup-form">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="form-row">{{ form.username.errors }}{{ form.username }}</div>
          <div class="form-row">{{ form.password.errors }}{{ form.password }}</div>
          <button type="submit" class="primary-btn">Login</button>
        </form>
      </section>
    </main>
  </div>

  <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
